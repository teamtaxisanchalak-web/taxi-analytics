<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Taxi Sanchalak — Analytics Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --ink: #0c0f14;
    --paper: #f5f3ee;
    --panel: #ffffff;
    --border: #e0ddd5;
    --accent: #1a3cff;
    --accent2: #ff3c1a;
    --muted: #888880;
    --tab-h: 56px;
    --bar-h: 52px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; overflow: hidden; background: var(--paper); font-family: 'Syne', sans-serif; }

  /* ── TOP BAR ── */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0; height: var(--bar-h);
    background: var(--ink); z-index: 1000;
    display: flex; align-items: center; padding: 0 24px;
    gap: 16px;
    border-bottom: 2px solid var(--accent);
  }

  .logo {
    font-size: 15px; font-weight: 800; color: #fff; letter-spacing: -.01em;
    display: flex; align-items: center; gap: 8px; white-space: nowrap;
  }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  .logo-sub { font-size: 11px; font-weight: 400; color: #666; font-family: 'DM Mono', monospace; }

  .spacer { flex: 1; }

  .hub-label {
    font-size: 11px; font-weight: 600; color: #555; letter-spacing: .12em; text-transform: uppercase;
    font-family: 'DM Mono', monospace;
  }

  /* ── TAB ROW ── */
  #tabrow {
    position: fixed; top: var(--bar-h); left: 0; right: 0; height: var(--tab-h);
    background: var(--paper);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-end; padding: 0 24px; gap: 2px;
    z-index: 999;
    overflow-x: auto;
  }
  #tabrow::-webkit-scrollbar { display: none; }

  .tab {
    position: relative;
    display: flex; align-items: center; gap: 8px;
    padding: 0 20px 0 16px;
    height: 40px;
    background: transparent;
    border: 1px solid transparent;
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 600;
    color: var(--muted);
    white-space: nowrap;
    transition: background .15s, color .15s;
    user-select: none;
  }
  .tab:hover { background: #ede9e0; color: var(--ink); }
  .tab.active {
    background: var(--panel);
    border-color: var(--border);
    color: var(--ink);
    box-shadow: 0 -2px 0 var(--accent) inset;
  }
  .tab .tab-icon {
    width: 24px; height: 24px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
  }
  .tab:nth-child(1) .tab-icon { background: #e8f0ff; }
  .tab:nth-child(2) .tab-icon { background: #e8fff8; }
  .tab:nth-child(3) .tab-icon { background: #fff3e8; }
  .tab.active:nth-child(1) .tab-icon { background: #1a3cff22; }
  .tab.active:nth-child(2) .tab-icon { background: #00d9a422; }
  .tab.active:nth-child(3) .tab-icon { background: #ff9c1a22; }

  .tab-badge {
    font-family: 'DM Mono', monospace;
    font-size: 9px; font-weight: 500;
    padding: 1px 5px; border-radius: 4px;
    background: var(--border); color: var(--muted);
    margin-left: 2px;
  }
  .tab.active .tab-badge { background: var(--accent); color: #fff; }

  /* ── FRAME AREA ── */
  #frames {
    position: fixed;
    top: calc(var(--bar-h) + var(--tab-h));
    left: 0; right: 0; bottom: 0;
  }

  .frame-wrap {
    position: absolute; inset: 0;
    display: none;
  }
  .frame-wrap.active { display: block; }

  iframe {
    width: 100%; height: 100%;
    border: none; display: block;
  }

  /* ── LOADING OVERLAY ── */
  .loading-overlay {
    position: absolute; inset: 0;
    background: var(--paper);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; z-index: 10;
    transition: opacity .3s;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .spin-ring {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-family: 'DM Mono', monospace;
    font-size: 12px; color: var(--muted);
    letter-spacing: .06em;
  }

  /* ── STATUS BAR ── */
  #statusbar {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 28px; background: var(--ink);
    display: flex; align-items: center; padding: 0 20px; gap: 20px;
    z-index: 1000;
    border-top: 1px solid #1e2430;
  }
  .st-item {
    display: flex; align-items: center; gap: 6px;
    font-family: 'DM Mono', monospace; font-size: 10px; color: #555;
  }
  .st-dot { width: 5px; height: 5px; border-radius: 50%; }
  .st-dot.green { background: #0fba78; box-shadow: 0 0 4px #0fba78; }
  .st-dot.blue  { background: var(--accent); box-shadow: 0 0 4px var(--accent); }
  #active-label { color: #999; margin-left: auto; }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    #topbar { padding: 0 14px; }
    #tabrow { padding: 0 10px; }
    .tab { padding: 0 12px 0 10px; font-size: 12px; }
    .hub-label { display: none; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="logo">
    <div class="logo-dot"></div>
    Taxi Sanchalak
    <span class="logo-sub">ANALYTICS HUB</span>
  </div>
  <div class="spacer"></div>
  <div class="hub-label" id="clock-display"></div>
</div>

<!-- TAB ROW -->
<div id="tabrow">
  <div class="tab active" onclick="switchTab(0, this)" data-index="0">
    <div class="tab-icon">🎯</div>
    Command Center
    <span class="tab-badge">MAIN</span>
  </div>
  <div class="tab" onclick="switchTab(1, this)" data-index="1">
    <div class="tab-icon">📞</div>
    Call Analytics
    <span class="tab-badge">LIVE</span>
  </div>
</div>

<!-- FRAMES -->
<div id="frames">

  <div class="frame-wrap active" id="fw-0">
    <div class="loading-overlay" id="lo-0">
      <div class="spin-ring"></div>
      <div class="loading-text">Loading Command Center…</div>
    </div>
    <iframe src="dashboard.html" id="if-0" onload="frameLoaded(0)"></iframe>
  </div>

  <div class="frame-wrap" id="fw-1">
    <div class="loading-overlay" id="lo-1">
      <div class="spin-ring"></div>
      <div class="loading-text">Loading Call Analytics…</div>
    </div>
    <iframe src="live_dashboard.html" id="if-1" onload="frameLoaded(1)" loading="lazy"></iframe>
  </div>

</div>

<!-- STATUS BAR -->
<div id="statusbar">
  <div class="st-item">
    <div class="st-dot green"></div>
    <span>2 DASHBOARDS</span>
  </div>
  <div class="st-item">
    <div class="st-dot blue"></div>
    <span>GITHUB PAGES</span>
  </div>
  <div class="st-item st-item--active" id="active-label">
    ACTIVE: <span id="active-name" style="color:#fff;margin-left:5px">COMMAND CENTER</span>
  </div>
</div>

<script>
  const tabs = [
    { name: 'COMMAND CENTER' },
    { name: 'CALL ANALYTICS' },
  ];

  let current = 0;
  const loaded = new Set([0]);

  function switchTab(idx, el) {
    if (idx === current) return;

    // Deactivate old
    document.querySelector('.tab.active').classList.remove('active');
    document.getElementById('fw-' + current).classList.remove('active');

    // Activate new
    el.classList.add('active');
    document.getElementById('fw-' + idx).classList.add('active');

    // Trigger lazy load
    if (!loaded.has(idx)) {
      loaded.add(idx);
      // iframe already has src via HTML; just ensure it's shown
    }

    current = idx;
    document.getElementById('active-name').textContent = tabs[idx].name;
  }

  function frameLoaded(idx) {
    const overlay = document.getElementById('lo-' + idx);
    if (overlay) overlay.classList.add('hidden');
  }

  // Clock
  function updateClock() {
    const now = new Date();
    document.getElementById('clock-display').textContent =
      now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
  }
  updateClock();
  setInterval(updateClock, 1000);
</script>
</body>
</html>
